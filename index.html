<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>iBuxCn · Earn & Reward Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Arial, sans-serif;
            background: linear-gradient(135deg, #0f0b07 0%, #2c150a 50%, #1f0805 100%);
            min-height: 100vh;
            font-size: 13px;
            line-height: 1.35;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .app-wrapper {
            max-width: 1450px;
            width: 100%;
            background: rgba(0, 0, 0, 0.35);
            border-radius: 32px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(255, 90, 35, 0.3);
            overflow: hidden;
            backdrop-filter: blur(3px);
        }

        /* header */
        .header {
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid #ff6e2e;
            padding: 8px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
        }

        .logo {
            background: rgba(255, 90, 40, 0.2);
            padding: 6px 14px;
            border-radius: 40px;
            border: 1px solid #ff7a3a;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .logo:hover {
            background: rgba(255, 90, 40, 0.5);
            transform: scale(0.98);
        }
        .logo img {
            height: 34px;
            width: auto;
            display: block;
        }
        .logo span {
            font-weight: 800;
            font-size: 1.2rem;
            color: #ffbc7a;
            letter-spacing: -0.5px;
        }

        .nav-tabs {
            display: flex;
            gap: 4px;
            background: #1f130e80;
            border-radius: 60px;
            padding: 4px 8px;
            flex-wrap: wrap;
        }
        .nav-tab {
            padding: 6px 20px;
            font-size: 0.8rem;
            font-weight: 600;
            background: transparent;
            border-radius: 40px;
            cursor: pointer;
            color: #ffcf9a;
            transition: 0.1s;
        }
        .nav-tab:hover { background: #ff6a2ccc; color: white; }
        .nav-tab.active {
            background: #ff5722;
            color: white;
            box-shadow: 0 2px 10px #ff5722aa;
        }

        .header-icons {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .balance-badge {
            background: #1f3a2a;
            padding: 5px 14px;
            border-radius: 30px;
            font-weight: bold;
            color: #d4ffb0;
            border-left: 3px solid #ffb347;
            font-size: 0.75rem;
        }
        .logout-icon {
            background: #5e2a1a;
            border: 1px solid #ff7840;
            padding: 5px 12px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            color: #ffc285;
        }

        /* main layout */
        .main-container {
            display: flex;
            min-height: calc(100vh - 62px);
        }
        .main-content {
            flex: 1;
            background: rgba(0, 0, 0, 0.25);
            padding: 20px 18px;
            overflow-y: auto;
            max-height: calc(100vh - 62px);
        }

        /* right sidebar (chat container) */
        .right-sidebar {
            width: 340px;
            background: rgba(12, 5, 3, 0.85);
            backdrop-filter: blur(12px);
            border-left: 1px solid #ff7840;
            display: flex;
            flex-direction: column;
            transition: all 0.25s ease;
        }
        .right-sidebar.collapsed {
            width: 0;
            padding: 0;
            overflow: hidden;
            border-left: none;
        }
        .chat-panel {
            background: #17100be6;
            border-radius: 20px;
            margin: 12px;
            display: flex;
            flex-direction: column;
            height: calc(100% - 24px);
            border: 1px solid #ff7640;
        }
        .panel-header {
            padding: 12px 16px;
            background: #2c1810;
            border-radius: 20px 20px 0 0;
            font-weight: bold;
            color: #ffbc7a;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .hide-chat-btn {
            background: none;
            border: none;
            color: #ffaa66;
            cursor: pointer;
            font-size: 1.1rem;
            font-weight: bold;
        }
        .messages-area {
            flex: 1;
            padding: 12px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
            min-height: 280px;
        }
        .message-bubble {
            max-width: 90%;
            padding: 8px 12px;
            border-radius: 18px;
            background: #2d1b12;
            color: #ffe0bc;
            font-size: 0.75rem;
            border: 1px solid #ff874c;
        }
        .message-bubble.user { align-self: flex-end; background: #ff5722dd; color: white; border-color: #ffb57a; }
        .message-bubble.bot { align-self: flex-start; background: #23150e; }
        .input-area {
            display: flex;
            gap: 6px;
            padding: 10px;
            border-top: 1px solid #ff7840;
            background: #1c0e08;
            border-radius: 0 0 20px 20px;
        }
        .chat-input { flex: 1; background: #2f1d13; border: 1px solid #ff7a48; border-radius: 40px; padding: 8px 14px; color: #fff0df; outline: none; }
        .send-btn { background: #ff5722; border: none; border-radius: 40px; padding: 6px 16px; color: white; font-weight: bold; cursor: pointer; }
        .show-chat-fab {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #ff5722;
            border-radius: 50px;
            padding: 10px 18px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            display: none;
            z-index: 200;
            box-shadow: 0 4px 12px black;
            border: 1px solid #ffaa66;
        }
        .action-buttons {
            display: flex;
            gap: 6px;
            margin-bottom: 12px;
            padding: 0 12px;
        }
        .action-btn {
            flex: 1;
            background: #2c1911;
            border: 1px solid #ff7840;
            padding: 6px 0;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: bold;
            color: #ffcf9a;
            cursor: pointer;
            text-align: center;
        }
        .action-btn.active-panel { background: #ff5722; color: white; border-color: #ffbc80; }

        /* card style for sections (earn, shop, leaders, profile, help) */
        .section-card {
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(6px);
            border-radius: 28px;
            border: 1px solid #ff7e44;
            padding: 20px 24px;
            margin-bottom: 20px;
        }
        .stats-grid, .offers-grid, .shop-grid, .leaderboard-list, .profile-details, .help-list {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            margin-top: 16px;
        }
        .stat-badge { background: #2e1c12; border-radius: 40px; padding: 10px 20px; border-left: 4px solid #ff7a3a; color: #ffdbb5; }
        .offer-item, .shop-item { background: #1e130d; padding: 10px 16px; border-radius: 28px; border: 1px solid #ff7a48; width: auto; min-width: 140px; color: #ffddb0; font-weight: 500; }
        .leader-row { background: #21120b; padding: 8px 16px; border-radius: 60px; display: flex; justify-content: space-between; width: 100%; border-bottom: 1px solid #ff7840; }
        .profile-field { background: #1d130e; padding: 8px 16px; border-radius: 20px; display: inline-block; margin-right: 12px; margin-bottom: 8px; }
        .help-item { background: #1f150f; padding: 12px 18px; border-radius: 24px; width: 100%; }
        h2 { color: #ffb66b; margin-bottom: 12px; font-size: 1.5rem; }
        h3 { color: #ffbc8a; margin-bottom: 8px; }
        hr { border-color: #ff7840; margin: 12px 0; }

        @media (max-width: 800px) {
            .main-container { flex-direction: column; }
            .right-sidebar { width: 100%; border-left: none; border-top: 1px solid #ff7840; max-height: 400px; }
            .right-sidebar.collapsed { display: none; }
            .show-chat-fab { display: flex; align-items: center; gap: 8px; }
            .nav-tabs { justify-content: center; }
        }
        @media (max-width: 550px) {
            .header { flex-direction: column; align-items: stretch; }
            .nav-tabs { justify-content: center; }
        }
        button { cursor: pointer; }
        .referral-code { background: #00000066; padding: 6px 12px; border-radius: 20px; font-family: monospace; }
    </style>
</head>
<body>
<div class="app-wrapper">
    <header class="header">
        <div class="logo" id="mainLogo">
            <img src="https://imglink.cc/cdn/_kyTq7xzuI.png" alt="iBuxCn" id="logoImage" onerror="this.onerror=null; this.parentElement.innerHTML='<span>🔥iBuxCn</span>'">
            <span>iBuxCn</span>
        </div>
        <nav class="nav-tabs" id="navTabs">
            <div class="nav-tab active" data-section="earn">EARN</div>
            <div class="nav-tab" data-section="shop">SHOP</div>
            <div class="nav-tab" data-section="leaders">LEADERS</div>
            <div class="nav-tab" data-section="profile">PROFILE</div>
            <div class="nav-tab" data-section="help">HELP</div>
            <div class="nav-tab" data-section="chatview">CHAT</div>
        </nav>
        <div class="header-icons">
            <div class="balance-badge">💎 BAL: 632</div>
            <div class="logout-icon" id="logoutBtn">🚪 EXIT</div>
        </div>
    </header>

    <div class="main-container">
        <main class="main-content" id="mainContent">
            <!-- dynamic sections loaded here -->
        </main>

        <aside class="right-sidebar" id="chatSidebar">
            <div class="chat-panel">
                <div class="panel-header">
                    <span>💬 COMMUNITY HUB</span>
                    <button class="hide-chat-btn" id="hideChatBtn">✕ HIDE</button>
                </div>
                <div class="action-buttons">
                    <button class="action-btn" data-chatpanel="chat">CHAT</button>
                    <button class="action-btn" data-chatpanel="rules">RULES</button>
                    <button class="action-btn" data-chatpanel="support">SUPPORT</button>
                </div>
                <div class="messages-area" id="chatMessagesArea">
                    <div class="message-bubble bot">✨ Welcome! Chat, rules & support here.</div>
                </div>
                <div class="input-area">
                    <input type="text" class="chat-input" id="chatMsgInput" placeholder="Write a message...">
                    <button class="send-btn" id="sendChatMsg">SEND</button>
                </div>
            </div>
        </aside>
    </div>
    <div class="show-chat-fab" id="showChatFab">💬 SHOW CHAT</div>
</div>

<script>
    (function() {
        // ---- DATA MODELS ----
        let currentSection = 'earn';
        let currentChatPanel = 'chat';
        let chatHistory = {
            chat: [{ role: 'bot', text: 'Welcome! Ask anything about tasks or promos.' }],
            rules: [{ role: 'bot', text: '📜 RULES:\n1. No cheating on offers.\n2. Respect members.\n3. Only one account.\n4. Enjoy grinding!' }],
            support: [{ role: 'bot', text: '🛟 SUPPORT: Open a ticket or describe your issue. We reply within 24h.' }]
        };

        // helper: render chat messages based on current panel
        function renderChatMessages() {
            const container = document.getElementById('chatMessagesArea');
            if (!container) return;
            const messages = chatHistory[currentChatPanel] || [];
            container.innerHTML = '';
            messages.forEach(msg => {
                const bubble = document.createElement('div');
                bubble.className = `message-bubble ${msg.role === 'user' ? 'user' : 'bot'}`;
                bubble.textContent = msg.text;
                container.appendChild(bubble);
            });
            container.scrollTop = container.scrollHeight;
        }

        function addMessage(panel, role, text) {
            if (!chatHistory[panel]) chatHistory[panel] = [];
            chatHistory[panel].push({ role, text });
            if (currentChatPanel === panel) renderChatMessages();
        }

        function setActiveChatButton(panel) {
            document.querySelectorAll('.action-btn[data-chatpanel]').forEach(btn => {
                if (btn.getAttribute('data-chatpanel') === panel) btn.classList.add('active-panel');
                else btn.classList.remove('active-panel');
            });
        }

        function switchChatPanel(panel) {
            currentChatPanel = panel;
            setActiveChatButton(panel);
            renderChatMessages();
            const inputField = document.getElementById('chatMsgInput');
            if (inputField) {
                if (panel === 'chat') inputField.placeholder = 'Type message...';
                else if (panel === 'rules') inputField.placeholder = 'Ask about rules...';
                else inputField.placeholder = 'Describe your issue...';
            }
        }

        function handleSendMessage() {
            const inputEl = document.getElementById('chatMsgInput');
            let msg = inputEl?.value.trim();
            if (!msg) return;
            addMessage(currentChatPanel, 'user', msg);
            if (inputEl) inputEl.value = '';
            setTimeout(() => {
                let reply = '';
                if (currentChatPanel === 'chat') reply = `🤖 Bot: "${msg}" — keep grinding, more offers coming!`;
                else if (currentChatPanel === 'rules') reply = `📜 Mod: Thanks for asking. ${msg} — our rules ensure fair earnings.`;
                else reply = `🛟 Support ticket: "${msg}" — we'll assist soon.`;
                addMessage(currentChatPanel, 'bot', reply);
            }, 200);
        }

        // ----- EARN section (based on 2nd image: offers, suppliers, stats)
        function renderEarn() {
            return `
                <div class="section-card">
                    <h2>💰 Earn Diamonds</h2>
                    <p>Complete offers, surveys, apps & games — get crypto, PayPal, gift cards.</p>
                    <div class="stats-grid">
                        <div class="stat-badge">📊 Completed Offers: 1,034,843</div>
                        <div class="stat-badge">💰 Total Earned: $473,095.15</div>
                        <div class="stat-badge">👥 Registered Users: 86,743</div>
                        <div class="stat-badge">🟢 Online: 2,890</div>
                    </div>
                    <hr>
                    <h3>🎯 Offer Walls</h3>
                    <div class="offers-grid">
                        <div class="offer-item">🔥 TOROX • High Pay</div>
                        <div class="offer-item">📱 AdscendMedia • Surveys</div>
                        <div class="offer-item">⚡ MM WALL (temp disabled)</div>
                        <div class="offer-item">🎮 ADGEM (temp disabled)</div>
                        <div class="offer-item">💎 MonliX • Play & Earn</div>
                        <div class="offer-item">🪙 waxrewards • Crypto</div>
                        <div class="offer-item">📲 dtowall • Daily bonus</div>
                        <div class="offer-item">🎁 lootably • High rewards</div>
                        <div class="offer-item">🍟 myChips • Surveys</div>
                        <div class="offer-item">🎯 NTIKME • Videos</div>
                        <div class="offer-item">📺 HANG ADS • Watch</div>
                    </div>
                    <hr>
                    <p>🔹 Join Discord for giveaways & level-exclusive promocodes!</p>
                </div>
            `;
        }

        // SHOP section (3rd image: cash/crypto + gift cards)
        function renderShop() {
            return `
                <div class="section-card">
                    <h2>🛒 Rewards Shop</h2>
                    <div class="shop-grid">
                        <div class="offer-item"><strong>💵 PayPal</strong> — from $5</div>
                        <div class="offer-item"><strong>₿ BITCOIN</strong> — instant crypto</div>
                        <div class="offer-item"><strong>✨ LITECOIN</strong> — low fees</div>
                        <div class="offer-item"><span style="opacity:0.7;">⚠️ Temporarily Disabled</span> (ETH)</div>
                        <div class="offer-item"><strong>🎁 RUBLEX</strong> Gift Card</div>
                        <div class="offer-item"><strong>🎮 DISCOVER NITRO</strong> • Discord Nitro</div>
                        <div class="offer-item"><strong>📦 Amazon</strong> Gift Cards</div>
                        <div class="offer-item"><strong>🎮 STEAM Wallet</strong> codes</div>
                    </div>
                    <p style="margin-top: 12px;">✅ More cards: Apple, Google Play, Razer Gold — coming soon!</p>
                </div>
            `;
        }

        // LEADERS (4th image: leaderboard with today earnings)
        function renderLeaders() {
            return `
                <div class="section-card">
                    <h2>🏆 Leaderboard</h2>
                    <p>⏳ Time left on today's leaderboard: 19h 39m 37s</p>
                    <div class="leaderboard-list" style="flex-direction:column;">
                        <div class="leader-row"><span>🥇 1st Kirk Wampler</span><span>Earned 4921 → today</span><span>💰 $1.00 Reward</span></div>
                        <div class="leader-row"><span>🥈 2nd K</span><span>Earned 2821 → today</span><span>Reward $0.80</span></div>
                        <div class="leader-row"><span>🥉 3rd Manow Warnjaidee</span><span>Earned 2450 → today</span><span>Reward $0.60</span></div>
                        <div class="leader-row"><span>4th Jidapa Pornsiri</span><span>Earned 2016 → today</span><span>Reward $0.50</span></div>
                        <div class="leader-row"><span>5th Jr_scruffy</span><span>Earned 1240 → today</span><span>Reward $0.40</span></div>
                        <div class="leader-row"><span>6th Oliver Bennett</span><span>Earned 735 → today</span><span>Reward $0.30</span></div>
                        <div class="leader-row"><span>7th Grosergio</span><span>Earned 512 → today</span><span>Reward $0.20</span></div>
                        <div class="leader-row"><span>8th FMLQUATTRO</span><span>Earned 386 → today</span><span>Reward $0.10</span></div>
                        <div class="leader-row"><span>9th + more</span><span>top 10 rewards daily</span><span>🔥</span></div>
                    </div>
                </div>
            `;
        }

        // PROFILE (5th image: details, diamonds, referral)
        function renderProfile() {
            return `
                <div class="section-card">
                    <h2>👤 Your Profile</h2>
                    <div class="profile-details" style="flex-direction:column; gap: 12px;">
                        <div><span class="profile-field">💰 Balance: 632 💎</span><span class="profile-field">🏆 Total Earned: 11,029</span></div>
                        <div><span class="profile-field">🆔 User ID: edfe85cd-18d4-41fd-be5a-1dd60036625e</span></div>
                        <div><span class="profile-field">📱 Platform ID: 107559421888581930108</span></div>
                        <div><span class="profile-field">✅ Verified: False</span><span class="profile-field">👥 Users Referred: 1</span></div>
                        <div><span class="profile-field">🔗 Referral Code: <strong>k99</strong></span><span class="profile-field">🔁 Referral %: 5%</span></div>
                        <div><span class="profile-field">🌐 Link: https://grindbux.com/ref/k99</span></div>
                        <div><span class="profile-field">⭐ Level 32 → Next level diamonds: 201 required</span></div>
                        <div><span class="profile-field">📋 Withdrawals: 0 | Held offers: 0 | Chargebacks: 0</span></div>
                    </div>
                    <button id="copyReferralBtn" style="margin-top:12px; background:#ff5722; border:none; padding:6px 18px; border-radius:60px; color:white;">📋 Copy Referral Link</button>
                </div>
            `;
        }

        // HELP (6th image: earnings diamonds, howto, suppliers)
        function renderHelp() {
            return `
                <div class="section-card">
                    <h2>🆘 Help Center</h2>
                    <div class="help-list">
                        <div class="help-item"><strong>💎 How do I earn diamonds?</strong><br>Complete offers & surveys via Torox, Adscend, MonliX, Lootably, Adgem, RevU, AyeTstudios. Also download apps, play games, watch videos on Cheddar.TV.</div>
                        <div class="help-item"><strong>📝 Survey providers:</strong> CPX Research, Inbrain.ai, Bitlabs, Timewall → high payouts.</div>
                        <div class="help-item"><strong>🔄 Withdrawing Diamonds:</strong> Go to Shop → choose PayPal, Bitcoin, Litecoin, or Gift Cards. Minimum payout: 500 diamonds.</div>
                        <div class="help-item"><strong>❓ Website Issues / Contact Support:</strong> Use our support chat (right panel) or email support@ibuxcn.com</div>
                        <div class="help-item"><strong>💰 Paid-to-click / Videos:</strong> daily PTC section available soon, check Offers wall.</div>
                    </div>
                    <p style="margin-top:12px;">📢 Discord: frequent giveaways & level promocodes!</p>
                </div>
            `;
        }

        // CHAT section inside main (optional show but we keep right sidebar)
        function renderChatMainView() {
            return `
                <div class="section-card">
                    <h2>💬 Community Chat Hub</h2>
                    <p>Interact with members, check rules, or get support via the right sidebar. Use tabs CHAT/RULES/SUPPORT.</p>
                    <div class="stats-mini" style="display:flex; gap:12px; margin-top:16px;">
                        <div class="stat-badge">👥 Active now: 142</div>
                        <div class="stat-badge">💬 Messages today: 879</div>
                    </div>
                </div>
            `;
        }

        function updateMainContent(sectionId) {
            const container = document.getElementById('mainContent');
            if (!container) return;
            let html = '';
            if (sectionId === 'earn') html = renderEarn();
            else if (sectionId === 'shop') html = renderShop();
            else if (sectionId === 'leaders') html = renderLeaders();
            else if (sectionId === 'profile') html = renderProfile();
            else if (sectionId === 'help') html = renderHelp();
            else if (sectionId === 'chatview') html = renderChatMainView();
            else html = renderEarn();
            container.innerHTML = html;
            if (sectionId === 'profile') {
                const copyBtn = document.getElementById('copyReferralBtn');
                if (copyBtn) copyBtn.onclick = () => { navigator.clipboard.writeText('https://grindbux.com/ref/k99'); alert('Referral link copied!'); };
            }
        }

        // Logo click: show Earn section (1st image style)
        function handleLogoClick() {
            currentSection = 'earn';
            updateMainContent('earn');
            document.querySelectorAll('.nav-tab').forEach(t => {
                t.classList.remove('active');
                if (t.getAttribute('data-section') === 'earn') t.classList.add('active');
            });
        }

        // Chat sidebar hide/show logic
        const chatSidebar = document.getElementById('chatSidebar');
        const showChatFab = document.getElementById('showChatFab');
        const hideChatBtn = document.getElementById('hideChatBtn');

        function hideChatSidebar() {
            if (chatSidebar) chatSidebar.classList.add('collapsed');
            if (showChatFab) showChatFab.style.display = 'flex';
        }
        function showChatSidebar() {
            if (chatSidebar) chatSidebar.classList.remove('collapsed');
            if (showChatFab) showChatFab.style.display = 'none';
        }
        if (hideChatBtn) hideChatBtn.addEventListener('click', hideChatSidebar);
        if (showChatFab) showChatFab.addEventListener('click', showChatSidebar);
        
        // initialize chat events
        function initChatEvents() {
            const sendBtn = document.getElementById('sendChatMsg');
            const chatInput = document.getElementById('chatMsgInput');
            if (sendBtn) sendBtn.addEventListener('click', handleSendMessage);
            if (chatInput) chatInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleSendMessage(); });
            document.querySelectorAll('.action-btn[data-chatpanel]').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const panel = btn.getAttribute('data-chatpanel');
                    if (panel === 'chat') switchChatPanel('chat');
                    else if (panel === 'rules') switchChatPanel('rules');
                    else if (panel === 'support') switchChatPanel('support');
                });
            });
            // set default active panel
            switchChatPanel('chat');
        }

        // Navigation
        function initNavigation() {
            const tabs = document.querySelectorAll('.nav-tab');
            tabs.forEach(tab => {
                tab.addEventListener('click', (e) => {
                    const section = tab.getAttribute('data-section');
                    if (!section) return;
                    currentSection = section;
                    updateMainContent(section);
                    tabs.forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    // On mobile, after nav maybe keep as is
                });
            });
        }

        // Logout simulation
        const logoutBtn = document.getElementById('logoutBtn');
        if (logoutBtn) logoutBtn.addEventListener('click', () => alert('🔒 Logout simulation — session cleared.'));

        // apply initial load
        function start() {
            updateMainContent('earn');
            initNavigation();
            initChatEvents();
            const logoDiv = document.getElementById('mainLogo');
            if (logoDiv) logoDiv.addEventListener('click', handleLogoClick);
            // ensure chat sidebar is visible on desktop, on mobile adjust
            if (window.innerWidth <= 800 && chatSidebar && !chatSidebar.classList.contains('collapsed')) {
                // optional: keep visible but fab logic ok
            }
            if (chatSidebar && chatSidebar.classList.contains('collapsed')) showChatSidebar(); // initial visible
        }
        start();
    })();
</script>
</body>
</html>
