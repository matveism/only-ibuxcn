<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>iBuxCn · Earn & Reward Platform</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: system-ui, -apple-system, 'Inter', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #0a0603 0%, #1f0f08 50%, #120604 100%);
            min-height: 100vh;
            font-size: 14px;
            line-height: 1.4;
        }

        /* App wrapper - full width mobile friendly */
        .app-wrapper {
            width: 100%;
            min-height: 100vh;
            background: rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
        }

        /* ========== HEADER ========== */
        .header {
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            border-bottom: 2px solid #ff6a2c;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            background: rgba(255, 90, 40, 0.2);
            padding: 6px 14px;
            border-radius: 40px;
            border: 1px solid #ff7a3a;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }
        .logo:active { transform: scale(0.97); background: rgba(255, 90, 40, 0.5); }
        .logo img {
            height: 30px;
            width: auto;
        }
        .logo span {
            font-weight: 800;
            font-size: 1.1rem;
            color: #ffbc7a;
        }

        /* mobile menu button */
        .mobile-menu-btn {
            background: #ff5722;
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 30px;
            display: none;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.5rem;
            color: white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }

        /* navigation tabs - desktop */
        .nav-tabs {
            display: flex;
            gap: 6px;
            background: rgba(30, 18, 12, 0.8);
            border-radius: 60px;
            padding: 4px 12px;
            flex-wrap: wrap;
        }
        .nav-tab {
            padding: 8px 18px;
            font-size: 0.8rem;
            font-weight: 600;
            background: transparent;
            border-radius: 40px;
            cursor: pointer;
            color: #ffcf9a;
            transition: 0.15s;
            white-space: nowrap;
        }
        .nav-tab:hover { background: #ff6a2ccc; color: white; }
        .nav-tab.active {
            background: #ff5722;
            color: white;
            box-shadow: 0 2px 8px #ff5722aa;
        }

        .header-icons {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
        }
        .balance-badge {
            background: #1f3a2a;
            padding: 6px 14px;
            border-radius: 40px;
            font-weight: bold;
            color: #e5ffb0;
            font-size: 0.75rem;
            border-left: 2px solid #ffb347;
        }
        .logout-icon {
            background: #4e2418;
            border: 1px solid #ff7840;
            padding: 6px 14px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            color: #ffc285;
            font-size: 0.75rem;
        }

        /* mobile navigation overlay */
        .mobile-nav-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            z-index: 200;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 16px;
            padding: 24px;
        }
        .mobile-nav-overlay.active {
            display: flex;
        }
        .mobile-nav-item {
            background: #2a1911;
            border: 1px solid #ff7840;
            width: 80%;
            max-width: 280px;
            padding: 16px 20px;
            text-align: center;
            border-radius: 60px;
            color: #ffcf9a;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.1s;
        }
        .mobile-nav-item:active { background: #ff5722; color: white; transform: scale(0.97); }
        .close-nav-btn {
            background: #ff5722;
            border: none;
            margin-top: 20px;
            padding: 12px 28px;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        /* main layout - flex column on mobile, row on desktop */
        .main-container {
            display: flex;
            flex: 1;
            flex-direction: row;
            min-height: calc(100vh - 70px);
        }

        .main-content {
            flex: 1;
            background: rgba(0, 0, 0, 0.2);
            padding: 16px;
            overflow-y: auto;
            max-height: calc(100vh - 70px);
        }

        /* right sidebar chat */
        .right-sidebar {
            width: 340px;
            background: rgba(10, 5, 3, 0.92);
            backdrop-filter: blur(12px);
            border-left: 1px solid #ff7840;
            display: flex;
            flex-direction: column;
            transition: all 0.25s ease;
        }
        .right-sidebar.collapsed {
            width: 0;
            padding: 0;
            overflow: hidden;
            border-left: none;
        }
        .chat-panel {
            background: #17100be6;
            border-radius: 24px;
            margin: 12px;
            display: flex;
            flex-direction: column;
            height: calc(100% - 24px);
            border: 1px solid #ff7640;
            overflow: hidden;
        }
        .panel-header {
            padding: 14px 16px;
            background: #2c1810;
            font-weight: bold;
            color: #ffbc7a;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .hide-chat-btn {
            background: none;
            border: none;
            color: #ffaa66;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: bold;
            padding: 6px 12px;
        }
        .action-buttons {
            display: flex;
            gap: 8px;
            padding: 12px;
            background: #1f110b;
        }
        .action-btn {
            flex: 1;
            background: #2c1911;
            border: 1px solid #ff7840;
            padding: 8px 0;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: bold;
            color: #ffcf9a;
            cursor: pointer;
            text-align: center;
        }
        .action-btn.active-panel { background: #ff5722; color: white; border-color: #ffbc80; }
        .messages-area {
            flex: 1;
            padding: 12px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
            min-height: 280px;
            background: #0f0805;
        }
        .message-bubble {
            max-width: 90%;
            padding: 8px 12px;
            border-radius: 18px;
            background: #2d1b12;
            color: #ffe0bc;
            font-size: 0.75rem;
            border: 1px solid #ff874c;
            word-break: break-word;
        }
        .message-bubble.user { align-self: flex-end; background: #ff5722dd; color: white; border-color: #ffb57a; }
        .message-bubble.bot { align-self: flex-start; background: #23150e; }
        .input-area {
            display: flex;
            gap: 8px;
            padding: 12px;
            border-top: 1px solid #ff7840;
            background: #1c0e08;
        }
        .chat-input {
            flex: 1;
            background: #2f1d13;
            border: 1px solid #ff7a48;
            border-radius: 40px;
            padding: 10px 14px;
            color: #fff0df;
            outline: none;
            font-size: 0.8rem;
        }
        .send-btn {
            background: #ff5722;
            border: none;
            border-radius: 40px;
            padding: 8px 18px;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
        .show-chat-fab {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #ff5722;
            border-radius: 50px;
            padding: 12px 20px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            display: none;
            z-index: 150;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            border: 1px solid #ffaa66;
            gap: 8px;
            align-items: center;
        }

        /* card styles */
        .section-card {
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(6px);
            border-radius: 28px;
            border: 1px solid #ff7e44;
            padding: 20px;
            margin-bottom: 20px;
        }
        .stats-grid, .offers-grid, .shop-grid, .leaderboard-list, .profile-details, .help-list {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 16px;
        }
        .stat-badge {
            background: #2e1c12;
            border-radius: 40px;
            padding: 8px 16px;
            border-left: 4px solid #ff7a3a;
            color: #ffdbb5;
            font-size: 0.8rem;
        }
        .offer-item, .shop-item {
            background: #1e130d;
            padding: 10px 16px;
            border-radius: 28px;
            border: 1px solid #ff7a48;
            min-width: 130px;
            color: #ffddb0;
            font-weight: 500;
            font-size: 0.8rem;
        }
        .leader-row {
            background: #21120b;
            padding: 10px 16px;
            border-radius: 60px;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 8px;
            border-bottom: 1px solid #ff7840;
            width: 100%;
        }
        .profile-field {
            background: #1d130e;
            padding: 8px 14px;
            border-radius: 30px;
            display: inline-block;
            margin-right: 10px;
            margin-bottom: 8px;
            font-size: 0.75rem;
            word-break: break-all;
        }
        .help-item {
            background: #1f150f;
            padding: 14px 18px;
            border-radius: 24px;
            width: 100%;
        }
        h2 { color: #ffb66b; margin-bottom: 12px; font-size: 1.4rem; }
        h3 { color: #ffbc8a; margin-bottom: 8px; font-size: 1rem; }
        hr { border-color: #ff7840; margin: 12px 0; }

        /* ========== MOBILE RESPONSIVE ========== */
        @media screen and (max-width: 780px) {
            .header {
                padding: 10px 12px;
            }
            .mobile-menu-btn {
                display: flex;
            }
            .nav-tabs {
                display: none;
            }
            .main-container {
                flex-direction: column;
            }
            .right-sidebar {
                width: 100%;
                border-left: none;
                border-top: 2px solid #ff7840;
                max-height: 450px;
                transition: all 0.2s;
            }
            .right-sidebar.collapsed {
                display: none;
            }
            .show-chat-fab {
                display: flex;
            }
            .main-content {
                max-height: none;
                padding: 12px;
            }
            .section-card {
                padding: 16px;
            }
            .offer-item, .shop-item {
                width: calc(50% - 12px);
                min-width: auto;
                text-align: center;
            }
            .leader-row {
                flex-direction: column;
                align-items: flex-start;
                gap: 4px;
            }
            .profile-field {
                display: block;
                width: 100%;
                margin-right: 0;
            }
        }

        @media screen and (max-width: 480px) {
            .offer-item, .shop-item {
                width: 100%;
            }
            .balance-badge {
                font-size: 0.65rem;
                padding: 4px 10px;
            }
            .logout-icon {
                padding: 4px 10px;
                font-size: 0.7rem;
            }
            .logo span {
                font-size: 0.9rem;
            }
            .logo img {
                height: 24px;
            }
        }

        button, .nav-tab, .action-btn, .logo, .logout-icon, .mobile-nav-item {
            cursor: pointer;
            transition: 0.1s ease;
        }
        .referral-code-block {
            background: #00000066;
            padding: 6px 12px;
            border-radius: 20px;
            font-family: monospace;
            font-size: 0.7rem;
            word-break: break-all;
        }
        .copy-btn {
            background: #ff5722;
            border: none;
            padding: 6px 14px;
            border-radius: 40px;
            color: white;
            margin-top: 8px;
        }
    </style>
</head>
<body>
<div class="app-wrapper">
    <header class="header">
        <div class="logo" id="mainLogo">
            <img src="https://imglink.cc/cdn/_kyTq7xzuI.png" alt="iBuxCn" id="logoImage" onerror="this.outerHTML='<div class=\'logo\'><span>🔥iBuxCn</span></div>'">

        </main>

                    <div class="message-bubble bot">✨ Welcome! Chat, rules & support available.</div>
                </div>

                    <input type="text" class="chat-input" id="chatMsgInput" placeholder="Type a message...">

<script>
    (function() {
        // ---------- DATA ----------
        let currentSection = 'earn';
        let currentChatPanel = 'chat';
        let chatHistory = {
            chat: [{ role: 'bot', text: '👋 Hey! Ask about offers, rewards or anything!' }],
            rules: [{ role: 'bot', text: '📜 RULES:\n• No cheating/spamming\n• Respect all members\n• One account per user\n• Enjoy earning!' }],
            support: [{ role: 'bot', text: '🛟 SUPPORT: Describe your issue. We respond within 24h. Use email or ticket system.' }]
        };

        function renderChatMessages() {
            const container = document.getElementById('chatMessagesArea');
            if (!container) return;
            const messages = chatHistory[currentChatPanel] || [];
            container.innerHTML = '';
            messages.forEach(msg => {
                const bubble = document.createElement('div');
                bubble.className = `message-bubble ${msg.role === 'user' ? 'user' : 'bot'}`;
                bubble.textContent = msg.text;
                container.appendChild(bubble);
            });
            container.scrollTop = container.scrollHeight;
        }

        function addMessage(panel, role, text) {
            if (!chatHistory[panel]) chatHistory[panel] = [];
            chatHistory[panel].push({ role, text });
            if (currentChatPanel === panel) renderChatMessages();
        }

        function setActiveChatButton(panel) {
            document.querySelectorAll('.action-btn[data-chatpanel]').forEach(btn => {
                if (btn.getAttribute('data-chatpanel') === panel) btn.classList.add('active-panel');
                else btn.classList.remove('active-panel');
            });
        }

        function switchChatPanel(panel) {
            currentChatPanel = panel;
            setActiveChatButton(panel);
            renderChatMessages();
            const inputField = document.getElementById('chatMsgInput');
            if (inputField) {
                if (panel === 'chat') inputField.placeholder = 'Type your message...';
                else if (panel === 'rules') inputField.placeholder = 'Ask about rules...';
                else inputField.placeholder = 'Describe your support issue...';
            }
        }

        function handleSendMessage() {
            const inputEl = document.getElementById('chatMsgInput');
            let msg = inputEl?.value.trim();
            if (!msg) return;
            addMessage(currentChatPanel, 'user', msg);
            if (inputEl) inputEl.value = '';
            setTimeout(() => {
                let reply = '';
                if (currentChatPanel === 'chat') {
                    reply = `🤖 Bot: "${msg}" — Keep grinding! Complete offers to earn diamonds.`;
                } else if (currentChatPanel === 'rules') {
                    reply = `📜 Mod: Thanks for checking. ${msg} — always follow fair play.`;
                } else {
                    reply = `🛟 Support: We received "${msg}". Our team will get back soon.`;
                }
                addMessage(currentChatPanel, 'bot', reply);
            }, 200);
        }

        // ----- SECTION RENDERS (based on images) -----

        }

        function renderHelp() {
            return `<div class="section-card">
                <h2>🆘 Help Center</h2>
                <div class="help-list">
                    <div class="help-item"><strong>💎 How to earn diamonds?</strong><br>Complete offers/surveys via Torox, Adscend, MonliX, Lootably, AdGem, RevU, AyeT. Also download apps, play games, watch Cheddar.TV.</div>

        }

        function renderChatMainView() {
            return `<div class="section-card">
                <h2>💬 Chat Hub</h2>
                <p>Use the right sidebar to chat, read rules, or get support. Choose between CHAT, RULES, SUPPORT tabs.</p>
                <div class="stats-grid"><div class="stat-badge">👥 Active: 142</div><div class="stat-badge">💬 Messages: 879 today</div></div>
            </div>`;
        }

        function updateMainContent(section) {
            const container = document.getElementById('mainContent');
            if (!container) return;
            let html = '';
            if (section === 'earn') html = renderEarn();
            else if (section === 'shop') html = renderShop();
            else if (section === 'leaders') html = renderLeaders();
            else if (section === 'profile') html = renderProfile();
            else if (section === 'help') html = renderHelp();
            else if (section === 'chatview') html = renderChatMainView();
            else html = renderEarn();
            container.innerHTML = html;
            if (section === 'profile') {
                const copyBtn = document.getElementById('copyReferralBtn');
                if (copyBtn) copyBtn.onclick = () => { navigator.clipboard.writeText('https://grindbux.com/ref/k99'); alert('Referral link copied!'); };
            }
        }

        // Logo click -> Earn section (1st image)
        function handleLogoClick() {
            currentSection = 'earn';
            updateMainContent('earn');
            setActiveNav('earn');
            closeMobileOverlay();
        }

        function setActiveNav(sectionId) {
            document.querySelectorAll('.nav-tab').forEach(tab => {
                tab.classList.remove('active');
                if (tab.getAttribute('data-section') === sectionId) tab.classList.add('active');
            });
        }

        function closeMobileOverlay() {
            const overlay = document.getElementById('mobileNavOverlay');
            if (overlay) overlay.classList.remove('active');
        }

        function openMobileOverlay() {
            const overlay = document.getElementById('mobileNavOverlay');
            if (overlay) overlay.classList.add('active');
        }

        // Chat sidebar hide/show
        const chatSidebar = document.getElementById('chatSidebar');
        const showChatFab = document.getElementById('showChatFab');
        const hideChatBtn = document.getElementById('hideChatBtn');

        function hideChatSidebar() {
            if (chatSidebar) chatSidebar.classList.add('collapsed');
            if (showChatFab) showChatFab.style.display = 'flex';
        }
        function showChatSidebar() {
            if (chatSidebar) chatSidebar.classList.remove('collapsed');
            if (showChatFab) showChatFab.style.display = 'none';
        }

        // ----- INITIALIZATION -----
        function init() {
            updateMainContent('earn');
            // Desktop nav
            document.querySelectorAll('.nav-tab').forEach(tab => {
                tab.addEventListener('click', (e) => {
                    const section = tab.getAttribute('data-section');
                    if (section) {
                        currentSection = section;
                        updateMainContent(section);
                        setActiveNav(section);
                        closeMobileOverlay();
                    }
                });
            });
            // Mobile overlay items
            document.querySelectorAll('.mobile-nav-item').forEach(item => {
                item.addEventListener('click', () => {
                    const section = item.getAttribute('data-section');
                    if (section) {
                        updateMainContent(section);
                        setActiveNav(section);
                        closeMobileOverlay();
                    }
                });
            });
            const mobileBtn = document.getElementById('mobileMenuBtn');
            if (mobileBtn) mobileBtn.addEventListener('click', openMobileOverlay);
            const closeNav = document.getElementById('closeNavBtn');
            if (closeNav) closeNav.addEventListener('click', closeMobileOverlay);
            document.getElementById('mobileNavOverlay')?.addEventListener('click', (e) => { if(e.target === document.getElementById('mobileNavOverlay')) closeMobileOverlay(); });
            
            // Chat events
            const sendBtn = document.getElementById('sendChatMsg');
            const chatInput = document.getElementById('chatMsgInput');
            if (sendBtn) sendBtn.addEventListener('click', handleSendMessage);
            if (chatInput) chatInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleSendMessage(); });
            document.querySelectorAll('.action-btn[data-chatpanel]').forEach(btn => {
                btn.addEventListener('click', () => {
                    const panel = btn.getAttribute('data-chatpanel');
                    if (panel === 'chat') switchChatPanel('chat');
                    else if (panel === 'rules') switchChatPanel('rules');
                    else if (panel === 'support') switchChatPanel('support');
                });
            });
            switchChatPanel('chat');
            
            if (hideChatBtn) hideChatBtn.addEventListener('click', hideChatSidebar);
            if (showChatFab) showChatFab.addEventListener('click', showChatSidebar);
            
            const logoDiv = document.getElementById('mainLogo');
            if (logoDiv) logoDiv.addEventListener('click', handleLogoClick);
            
            const logout = document.getElementById('logoutBtn');
            if (logout) logout.addEventListener('click', () => alert('🔒 Logout simulation. Session cleared.'));
            
            // ensure on mobile initially chat visible but not overlapping
            if (window.innerWidth <= 780) {
                // good
            }
        }
        init();
    })();
</script>
</body>
</html>
